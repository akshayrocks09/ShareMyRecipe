spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: false   # DDL managed by Hibernate in test mode



  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchClientAutoConfiguration

app:
  jwt:
    secret: test-secret-that-is-long-enough-for-hmac-sha-256-algorithm!
    access-token-ttl-ms: 900000
    refresh-token-ttl-days: 7

  s3:
    access-key: test
    secret-key: test
    region: us-east-1
    bucket: test-bucket
    cdn-base-url: http://localhost:9000/test-bucket

  features:
    email-verification-enabled: false

logging:
  level:
    com.recipeplatform: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

