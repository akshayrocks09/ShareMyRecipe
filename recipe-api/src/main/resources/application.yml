server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: recipe-api

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:recipe_platform}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate          # use Flyway for schema; never auto-drop in prod
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        acknowledge-mode: manual
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          multiplier: 2.0

# Elasticsearch
app:
  elasticsearch:
    host: ${ES_HOST:localhost}
    port: ${ES_PORT:9200}

  jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-at-least-32-chars!!}
    access-token-ttl-ms: 900000       # 15 minutes
    refresh-token-ttl-days: 7

  s3:
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}
    region: ${S3_REGION:us-east-1}
    bucket: ${S3_BUCKET:recipe-platform}
    cdn-base-url: ${CDN_BASE_URL:http://localhost:9000/recipe-platform}
    endpoint: ${S3_ENDPOINT:http://localhost:9000}    # remove for real AWS

  features:
    email-verification-enabled: ${EMAIL_VERIFICATION:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.recipeplatform: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
