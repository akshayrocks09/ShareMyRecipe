server:
  port: 8081

spring:
  application:
    name: recipe-worker

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:recipe_platform}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

app:
  elasticsearch:
    host: ${ES_HOST:localhost}
    port: ${ES_PORT:9200}

  s3:
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}
    region: ${S3_REGION:us-east-1}
    bucket: ${S3_BUCKET:recipe-platform}
    cdn-base-url: ${CDN_BASE_URL:http://localhost:9000/recipe-platform}
    endpoint: ${S3_ENDPOINT:http://localhost:9000}

  worker:
    concurrency: ${WORKER_CONCURRENCY:3}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.recipeplatform: DEBUG
    org.springframework.amqp: INFO
